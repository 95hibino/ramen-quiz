<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA: モバイル Web ブラウザのアドレスバー色 (ステータスバーにも反映) -->
    <meta name="theme-color" content="#d2452f" />
    <!-- iOS Safari: ホーム画面追加時にフルスクリーン化 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ラーメンクイズ" />
    <!-- manifest は vite-plugin-pwa がビルド時に生成する (/manifest.webmanifest) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Google Search Console 所有権確認 -->
    <meta name="google-site-verification" content="tBBGArHpR4F9BBkLGwg-21ehHVNmc8cro6fMuC1QOcc" />

    <!-- 各ページの <Seo /> (react-helmet-async) が動的に上書きするデフォルト値。 -->
    <title>ラーメンクイズ | 知識を試す 4 択クイズ</title>
    <meta name="description" content="ラーメンの歴史・地域・文化・製麺まで、奥深いラーメン知識を 4 択クイズで楽しく学ぼう。" />

    <!-- Open Graph (デフォルト) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ラーメンクイズ" />
    <meta property="og:title" content="ラーメンクイズ" />
    <meta property="og:description" content="ラーメンの歴史・地域・文化・製麺まで、奥深いラーメン知識を 4 択クイズで楽しく学ぼう。" />
    <meta property="og:image" content="/api/og?mode=hero" />
    <meta property="og:locale" content="ja_JP" />

    <!-- Twitter Card (デフォルト) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ラーメンクイズ" />
    <meta name="twitter:description" content="ラーメンの歴史・地域・文化・製麺まで、奥深いラーメン知識を 4 択クイズで楽しく学ぼう。" />
    <meta name="twitter:image" content="/api/og?mode=hero" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-ramen-noodle">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
